<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Star Robot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      background: #000;
      display: block;
      width: min(100vw, 800px);
      aspect-ratio: 800 / 500;
    }

    /* Touch controls — hidden on desktop */
    #touch-controls {
      display: none;
      width: min(100vw, 800px);
      padding: 14px 20px 6px;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
    .btn-group {
      display: flex;
      gap: 12px;
    }
    .touch-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 26px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.08s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }
    .touch-btn.pressed {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0.93);
    }
    .jump-btn {
      width: 76px;
      height: 76px;
      background: rgba(100, 200, 255, 0.15);
      border-color: rgba(100, 200, 255, 0.5);
      font-size: 13px;
      font-weight: bold;
      font-family: monospace;
      letter-spacing: 1px;
    }
    /* Show buttons only on touch devices */
    @media (pointer: coarse) {
      #touch-controls { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="500"></canvas>

  <div id="touch-controls">
    <div class="btn-group">
      <button class="touch-btn" data-key="ArrowLeft">◀</button>
      <button class="touch-btn" data-key="ArrowRight">▶</button>
    </div>
    <div class="btn-group">
      <button class="touch-btn jump-btn" data-key="Space">JUMP</button>
    </div>
  </div>

  <script type="module" src="js/main.js?v=3"></script>
  <script>
    // Touch controls — fire synthetic keyboard events so input.js handles them normally.
    // stopPropagation prevents the global touchstart listener from injecting 'Enter'.
    (function () {
      var buttons = document.querySelectorAll('#touch-controls .touch-btn');
      function fire(code, type) {
        window.dispatchEvent(new KeyboardEvent(type, { code: code, bubbles: true }));
      }
      buttons.forEach(function (btn) {
        var code = btn.dataset.key;
        btn.addEventListener('touchstart', function (e) {
          e.preventDefault();
          e.stopPropagation();
          btn.classList.add('pressed');
          fire(code, 'keydown');
        }, { passive: false });
        btn.addEventListener('touchend', function (e) {
          e.preventDefault();
          btn.classList.remove('pressed');
          fire(code, 'keyup');
        }, { passive: false });
        btn.addEventListener('touchcancel', function () {
          btn.classList.remove('pressed');
          fire(code, 'keyup');
        });
      });
    })();
  </script>
</body>
</html>
